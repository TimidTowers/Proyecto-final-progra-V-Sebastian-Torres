<ion-app>
  <ion-split-pane contentId="main-content" when="lg">
    <ion-menu contentId="main-content" type="overlay" side="start">
      <ion-header>
        <ion-toolbar color="primary">
          <ion-title>Tienda Virtual</ion-title>
        </ion-toolbar>
      </ion-header>

      <ion-content>
        <ion-list>
          <ion-item *ngIf="auth.usuario">
            <ion-avatar slot="start">
              <ion-icon name="person-circle" style="font-size: 42px;"></ion-icon>
            </ion-avatar>
            <ion-label>
              <h3>{{ auth.usuario.nombre }}</h3>
              <p>{{ auth.usuario.rol }}</p>
            </ion-label>
          </ion-item>

          <ion-item *ngIf="!auth.usuario" button routerLink="/login" routerDirection="root">
            <ion-icon slot="start" name="log-in"></ion-icon>
            <ion-label>Iniciar sesión</ion-label>
          </ion-item>

          <ion-item *ngFor="let op of opcionesVisibles()" button [routerLink]="op.ruta" routerDirection="root">
            <ion-icon slot="start" [name]="op.icono"></ion-icon>
            <ion-label>{{ op.titulo }}</ion-label>
            <ion-badge *ngIf="op.ruta === '/carrito' && carrito.totalItems > 0" slot="end" color="danger">
              {{ carrito.totalItems }}
            </ion-badge>
          </ion-item>

          <ion-item-divider>
            <ion-label>Tema</ion-label>
          </ion-item-divider>

          <ion-item>
            <ion-icon slot="start" name="sunny"></ion-icon>
            <ion-label>Modo claro</ion-label>
            <ion-toggle slot="end" [checked]="tema.modo === 'claro'" (ionChange)="cambiarTema('claro')"></ion-toggle>
          </ion-item>

          <ion-item>
            <ion-icon slot="start" name="moon"></ion-icon>
            <ion-label>Modo oscuro</ion-label>
            <ion-toggle slot="end" [checked]="tema.modo === 'oscuro'" (ionChange)="cambiarTema('oscuro')"></ion-toggle>
          </ion-item>

          <ion-item>
            <ion-icon slot="start" name="contrast"></ion-icon>
            <ion-label>Alto contraste</ion-label>
            <ion-toggle slot="end" [checked]="tema.modo === 'contraste'" (ionChange)="cambiarTema('contraste')"></ion-toggle>
          </ion-item>

          <ion-item *ngIf="auth.usuario" button (click)="logout()">
            <ion-icon slot="start" name="log-out"></ion-icon>
            <ion-label>Cerrar sesión</ion-label>
          </ion-item>
        </ion-list>
      </ion-content>
    </ion-menu>

    <ion-router-outlet id="main-content"></ion-router-outlet>
  </ion-split-pane>
</ion-app>
